name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set version
        run: echo "${{ steps.version.outputs.VERSION }}" > VERSION

      - name: Build app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent Folder.app Folder.app.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Folder.app.zip
          generate_release_notes: true
          body: |
            ## Install
            1. Download `Folder.app.zip` below
            2. Unzip and drag `Folder.app` to `/Applications`
            3. Open Folder — it will auto-update from now on

            ## What's in this release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
